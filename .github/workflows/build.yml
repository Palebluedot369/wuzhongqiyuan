name: Build Unity Android Project

on:
  push:
    branches: [ "main" ] # 当推送到 main 分支时触发
  workflow_dispatch:     # 允许手动在 GitHub 页面触发

env:
  UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }} # 推荐添加，避免许可证问题

jobs:
  buildForAndroid:
    name: Build for Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Decode Keystore
        run: echo "${{ secrets.UNITY_KEYSTORE_BASE64 }}" | base64 -d > ./user.keystore

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android
          androidKeystoreName: ./user.keystore
          androidKeystorePass: ${{ secrets.UNITY_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.UNITY_KEY_ALIAS }}
          androidKeyaliasPass: ${{ secrets.UNITY_KEY_PASS }}
          androidAppBundle: false    # 如果你想生成 .aab 文件，改为 true
          buildName: wuzhongqiyuan         # 自定义 APK 名称
          versioning: Semantic
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AndroidBuild
          path: build/Android/**/*.apk